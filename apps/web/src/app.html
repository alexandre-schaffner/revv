<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Revv</title>
		<script>
			// Prevent flash of wrong theme — runs synchronously before first paint
			(function () {
				var s = localStorage.getItem('revv-theme');
				var d =
					s === 'dark' ||
					(s !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
				if (d) document.documentElement.classList.add('dark');
				document.documentElement.style.colorScheme = d ? 'dark' : 'light';
				if (window.__TAURI__) document.documentElement.classList.add('tauri');
			})();
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>
		<link rel="icon" type="image/png" href="/favicon.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" spellcheck="false">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
